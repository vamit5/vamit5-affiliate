<!DOCTYPE html>
<html lang="sr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>VAMIT-5 · Admin Console</title>
<style>
:root{--bg:#05060a;--surface:rgba(20,24,42,0.85);--text:#e9ecff;--dim:#9aa0c4;--mute:#626890;--brand:#00f0ff;--brand2:#7a5bff;--lime:#a6ff3b;--gold:#ffc24b;--red:#ff4d5e;--border:rgba(255,255,255,0.08)}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Arial,sans-serif;background:var(--bg);color:var(--text);min-height:100vh}
body::before{content:"";position:fixed;inset:0;z-index:0;pointer-events:none;background:radial-gradient(900px 500px at 30% 20%,rgba(122,91,255,0.4),transparent 60%),radial-gradient(700px 400px at 70% 80%,rgba(0,240,255,0.3),transparent 60%)}

.loading{position:fixed;inset:0;background:var(--bg);display:grid;place-items:center;z-index:1000;padding:20px;text-align:center}
.loading .box{display:flex;flex-direction:column;align-items:center;gap:14px;max-width:380px}
.spinner{width:36px;height:36px;border:3px solid rgba(255,255,255,0.1);border-top-color:var(--brand);border-radius:50%;animation:spin .6s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.status{color:var(--dim);font-size:13px;font-family:monospace}
.err{margin-top:14px;padding:10px 14px;background:rgba(255,77,94,0.08);border:1px solid rgba(255,77,94,0.3);border-radius:8px;color:#ffb0b8;font-size:12px;display:none;max-width:360px;word-break:break-word}
.err.show{display:block}
.reset-btn{margin-top:10px;padding:9px 16px;border-radius:8px;background:rgba(255,255,255,0.06);border:1px solid var(--border);color:var(--text);font-family:inherit;font-size:12px;cursor:pointer;display:none}
.reset-btn.show{display:inline-block}
.loading.hidden{display:none}

.app{position:relative;z-index:1;max-width:1200px;margin:0 auto;padding:24px 20px 80px}

.topbar{display:flex;align-items:center;gap:14px;margin-bottom:24px;flex-wrap:wrap}
.brand{display:flex;align-items:center;gap:10px}
.brand .mark{width:38px;height:38px;border-radius:10px;background:linear-gradient(135deg,var(--brand),var(--brand2));text-align:center;line-height:38px;font-weight:900;font-size:13px;color:#fff}
.brand b{font-size:15px;font-weight:900}
.user{margin-left:auto;display:flex;align-items:center;gap:10px;font-size:12px;color:var(--dim);font-family:monospace}
.btn{padding:9px 14px;border-radius:9px;border:none;cursor:pointer;font-family:inherit;font-weight:700;font-size:12px;background:rgba(255,255,255,0.06);color:var(--text);border:1px solid var(--border)}
.btn:hover{background:rgba(255,255,255,0.1)}
.btn.red{background:rgba(255,77,94,0.1);border-color:rgba(255,77,94,0.3);color:#ffb0b8}
.btn.green{background:linear-gradient(135deg,var(--lime),#7cc94b);color:#0a0c14;border:none}
.btn.brand{background:linear-gradient(135deg,var(--brand),var(--brand2));color:#0a0c14;border:none}

.kpi-row{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:18px}
.kpi{padding:16px;border-radius:14px;background:var(--surface);border:1px solid var(--border)}
.kpi .l{font-size:10px;color:var(--mute);text-transform:uppercase;letter-spacing:0.12em;font-weight:700;margin-bottom:6px}
.kpi .v{font-size:24px;font-weight:800;letter-spacing:-0.01em}

.section{padding:20px;border-radius:18px;background:var(--surface);border:1px solid var(--border);margin-bottom:16px;backdrop-filter:blur(20px);overflow-x:auto}
.section h2{font-size:16px;font-weight:800;margin-bottom:14px}
table{width:100%;border-collapse:collapse;font-size:13px;min-width:520px}
th{text-align:left;padding:10px 12px;font-size:10.5px;text-transform:uppercase;letter-spacing:0.1em;color:var(--mute);font-weight:700;border-bottom:1px solid var(--border)}
td{padding:11px 12px;border-bottom:1px solid rgba(255,255,255,0.04);vertical-align:middle}
.tag{display:inline-block;padding:3px 8px;border-radius:5px;font-size:10px;font-weight:800;letter-spacing:0.06em;text-transform:uppercase}
.tag.pending{background:rgba(255,194,75,0.12);color:var(--gold)}
.tag.approved{background:rgba(166,255,59,0.12);color:var(--lime)}
.tag.rejected{background:rgba(255,77,94,0.12);color:#ffb0b8}
.actions{display:flex;gap:6px;flex-wrap:wrap}
.empty{text-align:center;padding:30px;color:var(--mute);font-size:13px}

.modal{position:fixed;inset:0;background:rgba(0,0,0,0.7);z-index:200;display:none;align-items:center;justify-content:center;padding:20px}
.modal.show{display:flex}
.modal .box{max-width:520px;width:100%;background:var(--surface);border:1px solid var(--border);border-radius:18px;padding:24px}
.modal h3{font-size:16px;margin-bottom:14px;font-weight:800}
.modal textarea{width:100%;min-height:80px;padding:10px;border-radius:8px;background:#0a0c14;color:var(--text);border:1px solid var(--border);font-family:monospace;font-size:11px}
.modal .actions{margin-top:14px;justify-content:flex-end}
.modal p{font-size:13px;color:var(--dim);line-height:1.5;margin-bottom:10px}

@media(max-width:768px){
  .app{padding:16px 14px 60px}
  .kpi-row{grid-template-columns:repeat(2,1fr)}
  .kpi .v{font-size:18px}
  .section{padding:14px}
  .section h2{font-size:14px}
}
</style>
</head>
<body>

<div class="loading" id="loading">
  <div class="box">
    <div class="spinner"></div>
    <div class="status" id="loadStatus">Ucitavanje admin panela...</div>
    <div class="err" id="loadErr"></div>
    <button class="reset-btn" id="resetBtn" onclick="localStorage.clear();sessionStorage.clear();location.href='/login.html'">Resetuj sesiju i idi na login</button>
  </div>
</div>

<div class="app" id="app" style="display:none">
  <div class="topbar">
    <div class="brand"><div class="mark">A</div><b>VAMIT-5 ADMIN</b></div>
    <div class="user"><span id="adminEmail">...</span><button class="btn red" onclick="logout()">Logout</button></div>
  </div>

  <div class="kpi-row">
    <div class="kpi"><div class="l">Atlete (aktivne)</div><div class="v" id="kpiAthletes">0</div></div>
    <div class="kpi"><div class="l">Pending prijave</div><div class="v" id="kpiPending">0</div></div>
    <div class="kpi"><div class="l">Prodaje (mesec)</div><div class="v" id="kpiSales">0</div></div>
    <div class="kpi"><div class="l">Provizija (mesec €)</div><div class="v" id="kpiCommission">0</div></div>
  </div>

  <div class="section">
    <h2>Aplikacije</h2>
    <table><thead><tr><th>Datum</th><th>Ime</th><th>Email</th><th>IG</th><th>Status</th><th>Akcije</th></tr></thead>
    <tbody id="appsBody"><tr><td colspan="6" class="empty">Ucitavanje...</td></tr></tbody></table>
  </div>

  <div class="section">
    <h2>Atlete</h2>
    <table><thead><tr><th>Username</th><th>Ime</th><th>Email</th><th>Tier</th><th>XP</th><th>Streak</th></tr></thead>
    <tbody id="athletesBody"><tr><td colspan="6" class="empty">Ucitavanje...</td></tr></tbody></table>
  </div>
</div>

<div class="modal" id="modal">
  <div class="box">
    <h3 id="modalTitle">...</h3>
    <div id="modalBody"></div>
    <div class="actions"><button class="btn" onclick="closeModal()">Zatvori</button></div>
  </div>
</div>

<script src="/config.js"></script>
<script type="module">
import { createClient } from 'https://esm.sh/@supabase/supabase-js@2';

const supabase = createClient(window.SUPABASE_URL, window.SUPABASE_ANON_KEY, {
  auth: { flowType: 'implicit', detectSessionInUrl: true, persistSession: true, autoRefreshToken: true, storage: window.localStorage }
});

const $status = document.getElementById('loadStatus');
const $err = document.getElementById('loadErr');
const $reset = document.getElementById('resetBtn');
const setStatus = function(t){ console.log('[admin]', t); $status.textContent = t; };
const showFatal = function(msg){
  console.error('[admin] FATAL:', msg);
  $err.textContent = msg; $err.classList.add('show');
  $reset.classList.add('show');
};

setStatus('Provera tokena...');
if (window.location.hash.indexOf('access_token=') > -1 || window.location.hash.indexOf('error=') > -1) {
  location.replace('/auth-callback.html' + window.location.hash);
  throw new Error('redirect to callback');
}

setStatus('Provera sesije...');
async function getSessionTimed(ms) {
  return Promise.race([
    supabase.auth.getSession().then(function(r){ return r.data.session; }).catch(function(){ return null; }),
    new Promise(function(r){ setTimeout(function(){ r(null); }, ms); })
  ]);
}

let session = await getSessionTimed(3500);
if (!session) {
  setStatus('Cekam Supabase init...');
  session = await new Promise(function(resolve){
    const t = setTimeout(function(){ resolve(null); }, 3000);
    const sub = supabase.auth.onAuthStateChange(function(event, s){
      if (s && s.user){ clearTimeout(t); sub.data.subscription.unsubscribe(); resolve(s); }
      if (event === 'INITIAL_SESSION' && !s){ clearTimeout(t); sub.data.subscription.unsubscribe(); resolve(null); }
    });
  });
}

if (!session) {
  setStatus('Nema sesije, preusmerenje na login...');
  location.replace('/login.html');
  throw new Error('No session');
}

setStatus('Provera admin permisija...');
let adminData = null;
try {
  const r = await Promise.race([
    supabase.from('admins').select('*').eq('id', session.user.id).maybeSingle(),
    new Promise(function(rs){ setTimeout(function(){ rs({ data: null, error: { message: 'DB timeout 5s' } }); }, 5000); })
  ]);
  if (r.error) throw new Error(r.error.message);
  adminData = r.data;
} catch(e) {
  showFatal('Greska baze: ' + e.message);
  throw e;
}

if (!adminData) {
  setStatus('Nisi admin — preusmerenje...');
  alert('Pristup zabranjen — nisi admin.');
  location.replace('/dashboard.html');
  throw new Error('Not admin');
}

document.getElementById('adminEmail').textContent = adminData.email;

setStatus('Ucitavanje podataka...');

function fmtDate(s){ if(!s) return '—'; const d = new Date(s); return d.toLocaleDateString('sr',{ day:'2-digit', month:'short', year:'numeric'}); }
function escapeHtml(s){ return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;'); }

async function loadOverview(){
  try {
    const startMonth = new Date(); startMonth.setDate(1); startMonth.setHours(0,0,0,0);
    const [aR, pR, sR] = await Promise.all([
      supabase.from('athletes').select('id', { count: 'exact', head: true }),
      supabase.from('applications').select('id', { count: 'exact', head: true }).eq('status','pending'),
      supabase.from('sales').select('commission_cents,status,created_at').gte('created_at', startMonth.toISOString())
    ]);
    document.getElementById('kpiAthletes').textContent = aR.count || 0;
    document.getElementById('kpiPending').textContent = pR.count || 0;
    const sales = (sR.data || []).filter(function(s){ return s.status === 'confirmed' || s.status === 'pending'; });
    document.getElementById('kpiSales').textContent = sales.length;
    const total = sales.reduce(function(a,s){ return a + (s.commission_cents || 0); }, 0);
    document.getElementById('kpiCommission').textContent = (total / 100).toFixed(0);
  } catch(e){ console.error('overview load failed', e); }
}

async function loadApplications(){
  try {
    const { data, error } = await supabase.from('applications').select('*').order('created_at', { ascending: false });
    if (error) throw error;
    const body = document.getElementById('appsBody');
    if (!data || !data.length){ body.innerHTML = '<tr><td colspan="6" class="empty">Jos nema aplikacija.</td></tr>'; return; }
    body.innerHTML = data.map(function(a){
      const actions = a.status === 'pending'
        ? '<button class="btn green" onclick="approveApp(\'' + a.id + '\',\'' + escapeHtml(a.email).replace(/'/g,'&#39;') + '\',\'' + escapeHtml(a.full_name).replace(/'/g,'&#39;') + '\')">Odobri</button>' +
          '<button class="btn red" onclick="rejectApp(\'' + a.id + '\')">Odbij</button>'
        : '';
      return '<tr><td>' + fmtDate(a.created_at) + '</td>' +
        '<td><b>' + escapeHtml(a.full_name) + '</b></td>' +
        '<td>' + escapeHtml(a.email) + '</td>' +
        '<td>@' + escapeHtml(a.instagram_handle || '') + '</td>' +
        '<td><span class="tag ' + a.status + '">' + a.status + '</span></td>' +
        '<td><div class="actions">' + actions + '</div></td></tr>';
    }).join('');
  } catch(e){ document.getElementById('appsBody').innerHTML = '<tr><td colspan="6" class="empty">Greska: ' + e.message + '</td></tr>'; }
}

async function loadAthletes(){
  try {
    const { data, error } = await supabase.from('athletes').select('*').order('created_at', { ascending: false });
    if (error) throw error;
    const body = document.getElementById('athletesBody');
    if (!data || !data.length){ body.innerHTML = '<tr><td colspan="6" class="empty">Jos nema atleta.</td></tr>'; return; }
    body.innerHTML = data.map(function(a){
      return '<tr><td><b>@' + escapeHtml(a.username) + '</b></td>' +
        '<td>' + escapeHtml(a.full_name) + '</td>' +
        '<td>' + escapeHtml(a.email) + '</td>' +
        '<td><span class="tag approved">' + (a.tier || 'recruit').toUpperCase() + '</span></td>' +
        '<td>' + (a.xp || 0) + '</td>' +
        '<td>' + (a.current_streak || 0) + '</td></tr>';
    }).join('');
  } catch(e){ document.getElementById('athletesBody').innerHTML = '<tr><td colspan="6" class="empty">Greska: ' + e.message + '</td></tr>'; }
}

window.approveApp = async function(id, email, fullName){
  if (!confirm('Odobri ' + fullName + ' (' + email + ')?\n\nKreira se atleta nalog i salje magic link.')) return;
  const username = fullName.toLowerCase().normalize('NFD').replace(/[̀-ͯ]/g,'').replace(/[^a-z0-9]/g,'-').replace(/-+/g,'-').replace(/^-|-$/g,'');
  try {
    const { data, error } = await supabase.functions.invoke('approve-application', {
      body: { application_id: id, username: username }
    });
    if (error) { alert('Greska: ' + error.message); return; }
    if (data && data.error) { alert('Greska: ' + data.error); return; }
    const link = (data && data.magic_link) || '';
    const sent = data && data.email_sent;
    showModal(fullName + ' je odobren', 
      '<p>' + (sent ? 'Email poslat na ' + email : 'Email NIJE poslat — kopiraj link i posalji rucno') + '</p>' +
      '<p>Magic link (vazi 24h):</p>' +
      '<textarea readonly>' + link + '</textarea>'
    );
    loadApplications();
    loadAthletes();
    loadOverview();
  } catch(e){ alert('Greska: ' + e.message); }
};

window.rejectApp = async function(id){
  const reason = prompt('Razlog odbijanja:');
  if (reason === null) return;
  try {
    const { error } = await supabase.from('applications').update({
      status: 'rejected',
      rejection_reason: reason,
      reviewed_at: new Date().toISOString()
    }).eq('id', id);
    if (error){ alert('Greska: ' + error.message); return; }
    alert('Aplikacija odbijena.');
    loadApplications();
  } catch(e){ alert('Greska: ' + e.message); }
};

function showModal(title, body){
  document.getElementById('modalTitle').textContent = title;
  document.getElementById('modalBody').innerHTML = body;
  document.getElementById('modal').classList.add('show');
}
window.closeModal = function(){ document.getElementById('modal').classList.remove('show'); };

window.logout = async function(){
  await supabase.auth.signOut();
  location.href = '/login.html';
};

await loadOverview();
loadApplications();
loadAthletes();

document.getElementById('loading').classList.add('hidden');
document.getElementById('app').style.display = 'block';
</script>
</body>
</html>
