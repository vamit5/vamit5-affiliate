<!DOCTYPE html>
<html lang="sr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>VAMIT-5 Athletes · Login</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Arial,sans-serif;background:#05060a;color:#e9ecff;min-height:100vh;display:grid;place-items:center;padding:20px}
body::before{content:"";position:fixed;inset:0;z-index:0;pointer-events:none;background:radial-gradient(900px 500px at 30% 20%,rgba(122,91,255,0.4),transparent 60%),radial-gradient(700px 400px at 70% 80%,rgba(0,240,255,0.3),transparent 60%)}
.card{position:relative;z-index:1;width:100%;max-width:420px;padding:36px;border-radius:24px;background:rgba(20,24,42,0.9);backdrop-filter:blur(20px);border:1px solid rgba(0,240,255,0.2)}
.logo{text-align:center;margin-bottom:24px}
.logo .mark{display:inline-block;width:42px;height:42px;border-radius:12px;background:linear-gradient(135deg,#00f0ff,#7a5bff,#ff3b9a);text-align:center;line-height:42px;font-weight:900;font-size:14px;color:#fff}
.logo b{display:block;margin-top:10px;font-size:18px;font-weight:900;letter-spacing:0.02em}
h1{font-size:22px;font-weight:800;text-align:center;margin-bottom:6px}
.sub{color:#9aa0c4;text-align:center;font-size:13px;margin-bottom:24px}
.field{margin-bottom:14px}
.field label{font-size:11px;font-weight:700;color:#9aa0c4;text-transform:uppercase;letter-spacing:0.12em;display:block;margin-bottom:6px}
.field input{width:100%;padding:13px 14px;border-radius:11px;border:1px solid rgba(255,255,255,0.1);background:rgba(255,255,255,0.04);color:#e9ecff;font-family:inherit;font-size:14px;outline:none}
.field input:focus{border-color:#00f0ff}
.btn{width:100%;padding:13px;border-radius:11px;border:none;cursor:pointer;font-family:inherit;font-weight:700;font-size:14px;background:linear-gradient(135deg,#00f0ff,#7a5bff);color:#0a0c14;margin-top:6px}
.btn:disabled{opacity:.6;cursor:wait}
.foot{text-align:center;margin-top:20px;color:#9aa0c4;font-size:13px}
.foot a{color:#00f0ff;text-decoration:none;font-weight:600}
.note{margin-top:16px;padding:12px;border-radius:10px;background:rgba(0,240,255,0.06);border:1px solid rgba(0,240,255,0.18);color:#9aa0c4;font-size:12px;line-height:1.5}
.spinner{display:inline-block;width:14px;height:14px;border:2px solid rgba(0,0,0,0.3);border-top-color:#0a0c14;border-radius:50%;animation:spin .6s linear infinite;margin-right:8px;vertical-align:-2px}
@keyframes spin{to{transform:rotate(360deg)}}
.error-box{display:none;padding:10px 14px;background:rgba(255,77,94,0.1);border:1px solid rgba(255,77,94,0.35);border-radius:10px;color:#ffb0b8;font-size:13px;margin-bottom:14px}
.error-box.show{display:block}
.success-box{display:none;padding:14px;background:rgba(166,255,59,0.1);border:1px solid rgba(166,255,59,0.35);border-radius:10px;color:#b5ffb0;font-size:13px;margin-bottom:14px;text-align:center}
.success-box.show{display:block}
.reset-link{display:block;text-align:center;margin-top:14px;color:#626890;font-size:11px;text-decoration:none}
</style>
</head>
<body>
<div class="card">
  <div class="logo">
    <div class="mark">V5</div>
    <b>VAMIT-5 ATHLETES</b>
  </div>
  <h1>Dobrodosao nazad</h1>
  <p class="sub">Login na tvoj atleta dashboard.</p>

  <div class="error-box" id="errorBox"></div>
  <div class="success-box" id="successBox"></div>

  <div id="loginForm">
    <div class="field">
      <label for="email">Email</label>
      <input id="email" type="email" placeholder="ti@gmail.com" autocomplete="email">
    </div>
    <button type="button" class="btn" id="submitBtn" onclick="sendCode()">
      <span id="btnText">Posalji kod na email</span>
    </button>
  </div>

  <div id="otpForm" style="display:none;margin-top:14px">
    <div class="field">
      <label for="code">Kod iz email-a</label>
      <input id="code" type="text" inputmode="numeric" pattern="[0-9]*" maxlength="10" placeholder="123456" autocomplete="one-time-code" style="text-align:center;font-size:20px;letter-spacing:4px;font-weight:800">
    </div>
    <button type="button" class="btn" id="verifyBtn" onclick="verifyCode()">
      <span id="verifyText">Potvrdi i uloguj se</span>
    </button>
    <div style="text-align:center;margin-top:12px"><a href="javascript:void(0)" onclick="resetForm()" style="color:var(--brand);font-size:12px;text-decoration:none">Zatrazi nov kod</a></div>
  </div>

  <div class="foot">
    Nemas nalog? <a href="/index.html#apply">Prijavi se za audiciju</a>
  </div>
  <div class="note">
    Bez lozinke. Dobijas 6-cifreni kod na email — unesi ga ispod. Radi i u PWA aplikaciji (iOS Home Screen ikoni).
  </div>
  <a class="reset-link" href="javascript:void(0)" onclick="localStorage.clear();sessionStorage.clear();alert('Sesija ocistena. Probaj ponovo.');location.reload()">Reset sesije (ako se nesto zaglavi)</a>
</div>

<script src="/config.js"></script>
<script type="module">
import { createClient } from 'https://esm.sh/@supabase/supabase-js@2';
const supabase = createClient(window.SUPABASE_URL, window.SUPABASE_ANON_KEY, {
  auth: { flowType: 'implicit', detectSessionInUrl: true, persistSession: true, autoRefreshToken: true }
});

// If URL has tokens (came directly from magic link), forward to callback handler
if (window.location.hash.indexOf('access_token=') > -1 || window.location.hash.indexOf('error=') > -1) {
  // hash will be handled by dashboard.html
  location.replace('/dashboard.html' + window.location.hash);
}

// Auto-redirect if already logged in (with timeout — never blocks form display)
(async function() {
  try {
    const result = await Promise.race([
      supabase.auth.getSession(),
      new Promise(function(r){ setTimeout(function(){ r({ data: { session: null } }); }, 2000); })
    ]);
    const session = result.data && result.data.session;
    if (session && session.user) {
      const { data: admin } = await Promise.race([
        supabase.from('admins').select('id').eq('email', session.user.email).maybeSingle(),
        new Promise(function(r){ setTimeout(function(){ r({ data: null }); }, 2000); })
      ]);
      location.replace(admin ? '/admin.html' : '/dashboard.html');
    }
  } catch (e) { console.log('[login] auto-redirect skipped', e); }
})();

const showError = function(msg) {
  const e = document.getElementById('errorBox');
  e.textContent = msg;
  e.classList.add('show');
  setTimeout(function(){ e.classList.remove('show'); }, 6000);
};
const showSuccess = function(msg) {
  const s = document.getElementById('successBox');
  s.textContent = msg;
  s.classList.add('show');
};

let savedEmail = '';
try { savedEmail = localStorage.getItem('v5_otp_email') || ''; if (savedEmail) document.getElementById('email').value = savedEmail; } catch(e){}

window.sendCode = async function(){
  const email = document.getElementById('email').value.trim().toLowerCase();
  const btn = document.getElementById('submitBtn');
  const txt = document.getElementById('btnText');
  if (!email || !email.includes('@')) { showError('Unesi validan email adresu'); return; }
  btn.disabled = true;
  txt.innerHTML = '<span class="spinner"></span>Slanje...';
  console.log('[login] sendCode start', email);
  try {
    const result = await supabase.auth.signInWithOtp({ email: email, options: { shouldCreateUser: true } });
    console.log('[login] sendCode result:', result);
    if (result.error) {
      showError('Greska (' + (result.error.status || '?') + '): ' + result.error.message);
      btn.disabled = false; txt.textContent = 'Posalji kod na email';
      return;
    }
    savedEmail = email;
    try { localStorage.setItem('v5_otp_email', email); } catch(e){}
    showSuccess('Kod poslat na ' + email + '. Proveri email + spam folder.');
    document.getElementById('loginForm').style.display = 'none';
    document.getElementById('otpForm').style.display = 'block';
    setTimeout(function(){ try { document.getElementById('code').focus(); } catch(e){} }, 200);
  } catch(err) {
    console.error('[login] sendCode err:', err);
    showError('Greska: ' + (err.message || JSON.stringify(err)));
    btn.disabled = false; txt.textContent = 'Posalji kod na email';
  }
};

window.verifyCode = async function(){
  const code = document.getElementById('code').value.trim();
  if (!code || code.length < 5) { showError('Unesi kod iz email-a'); return; }
  const btn = document.getElementById('verifyBtn');
  const txt = document.getElementById('verifyText');
  btn.disabled = true;
  txt.innerHTML = '<span class="spinner"></span>Provera...';
  try {
    const result = await supabase.auth.verifyOtp({ email: savedEmail, token: code, type: 'email' });
    console.log('[login] verify result:', result);
    if (result.error) {
      showError('Greska: ' + result.error.message);
      btn.disabled = false; txt.textContent = 'Potvrdi i uloguj se';
      return;
    }
    if (result.data && result.data.session) {
      try { localStorage.removeItem('v5_otp_email'); } catch(e){}
      showSuccess('Uspesno! Preusmeravam...');
      const adm = await supabase.from('admins').select('id').eq('email', savedEmail).maybeSingle();
      setTimeout(function(){ location.replace(adm.data ? '/admin.html' : '/dashboard.html'); }, 600);
    }
  } catch(err) {
    showError('Greska: ' + (err.message || JSON.stringify(err)));
    btn.disabled = false; txt.textContent = 'Potvrdi i uloguj se';
  }
};

window.resetForm = function(){
  document.getElementById('loginForm').style.display = 'block';
  document.getElementById('otpForm').style.display = 'none';
  document.getElementById('code').value = '';
  document.getElementById('submitBtn').disabled = false;
  document.getElementById('btnText').textContent = 'Posalji 6-cifreni kod';
  document.getElementById('successBox').classList.remove('show');
};
</script>
</body>
</html>
