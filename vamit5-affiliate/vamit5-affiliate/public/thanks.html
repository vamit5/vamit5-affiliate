<!DOCTYPE html>
<html lang="sr">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width,initial-scale=1.0" />
<title>VAMIT-5 · Hvala!</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800;900&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Inter',sans-serif;background:#05060a;color:#e9ecff;min-height:100vh;display:grid;place-items:center;padding:20px}
body::before{content:"";position:fixed;inset:0;background:radial-gradient(800px 500px at 30% 20%,rgba(166,255,59,0.18),transparent 60%),radial-gradient(700px 400px at 70% 80%,rgba(0,240,255,0.18),transparent 60%);z-index:0}
.box{position:relative;z-index:1;max-width:440px;text-align:center;padding:50px 30px;background:rgba(20,24,42,0.85);border:1px solid rgba(166,255,59,0.3);border-radius:24px;backdrop-filter:blur(20px)}
.ico{font-size:72px;margin-bottom:16px}
h1{font-size:30px;font-weight:900;letter-spacing:-0.02em;margin-bottom:10px;background:linear-gradient(180deg,#fff,#a6ff3b);-webkit-background-clip:text;background-clip:text;color:transparent}
p{color:#9aa0c4;font-size:14px;line-height:1.6;margin-bottom:20px}
.btn{display:inline-block;padding:14px 26px;border-radius:11px;background:linear-gradient(135deg,#00f0ff,#7a5bff);color:#0a0c14;text-decoration:none;font-weight:800;font-size:14px;margin-top:10px}
</style>
</head>
<body>
<div class="box">
  <div class="ico">🎉</div>
  <h1>Pretplata aktivirana!</h1>
  <p>Email sa pristupnim podacima za VAMIT-5 app stici ce u roku od 5 minuta. Proveri spam folder ako ne vidis.</p>
  <p style="font-size:12px;color:#626890">Tvoj affiliate je nagradjen — hvala sto si podrzao njegovu zajednicu.</p>
  <a href="https://vamit5.app" class="btn">Idi na VAMIT-5 app →</a>
</div>
</body>
</html>
